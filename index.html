<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Surat - Aplikasi Surat Menyurat</title>
    <link
      rel="icon"
      href="assets/icon-192.png"
      type="image/png"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="assets/icon-192.png" />
    <link
      rel="preload"
      href="styles.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript><link rel="stylesheet" href="styles.css" /></noscript>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Outfit font removed: app uses Plus Jakarta Sans from styles.css -->
    <link
      rel="preload"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    /></noscript>
  </head>
  <body class="light-mode">
    <div id="app">
      <!-- Loading Overlay -->
      <div id="loading-overlay" class="overlay">
        <div class="loader"></div>
      </div>

      <!-- Login Screen -->
      <div id="login-screen" class="screen active">
        <div class="login-card">
          <div class="login-header">
            <div class="logo">
              <i class="fas fa-envelope-open-text"></i>
            </div>
            <h1>E-Surat</h1>
            <p>Silakan masuk ke akun Anda</p>
          </div>
          <form id="login-form">
            <div class="form-group">
              <label for="username"
                ><i class="fas fa-user-circle"></i> Username</label
              >
              <input
                type="text"
                id="username"
                required
                placeholder="Masukkan username"
              />
            </div>
            <div class="form-group">
              <label for="password"><i class="fas fa-lock"></i> Password</label>
              <input
                type="password"
                id="password"
                required
                autocomplete="current-password"
                placeholder="Masukkan password"
              />
            </div>
            <button type="submit" class="btn-login">
              Masuk <i class="fas fa-arrow-right"></i>
            </button>
            <div id="login-error" class="error-msg"></div>
          </form>
          <div class="login-footer">
            <p>copyright by Masandigital.com @2026</p>
          </div>
        </div>
      </div>

      <!-- Dashboard Screen (Dynamic) -->
      <div id="dashboard-screen" class="screen">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <i class="fas fa-paper-plane"></i>
            <span>E-Surat</span>
          </div>
          <nav class="sidebar-nav">
            <div id="nav-items">
              <!-- Role specific nav items will be injected here -->
            </div>
            <div class="nav-divider"></div>
            <div class="sidebar-bottom">
              <a href="#" id="btn-logout" class="nav-item logout">
                <i class="fas fa-sign-out-alt"></i>
                <span>Keluar</span>
              </a>
            </div>
          </nav>
        </aside>
        <!-- duplicate sidebar-overlay removed -->
        <main class="main-content">
          <header class="top-bar">
            <div class="menu-toggle" id="menu-toggle">
              <i class="fas fa-bars"></i>
            </div>
            <div class="page-title">
              <h2 id="current-view-title">Dashboard</h2>
            </div>
            <div class="user-profile">
              <div class="user-info">
                <span id="user-display-name" class="name">User Name</span>
                <span id="user-display-role" class="role">Role</span>
              </div>
              <div class="avatar" id="user-avatar">
                <i class="fas fa-user"></i>
              </div>
            </div>
          </header>
          <div id="content-area" class="content-scroll">
            <!-- Dynamic content will be injected here -->
          </div>
        </main>
      </div>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modal-title">Modal Title</h3>
          <button id="close-modal" class="close-modal">&times;</button>
        </div>
        <div class="modal-body" id="modal-content">
          <!-- Modal content injected here -->
        </div>
      </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast-container" class="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" defer></script>
    <script src="app.js" defer></script>
  </body>
</html>
